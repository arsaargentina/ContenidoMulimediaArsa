name: Sync Google Drive Content

on:
  schedule:
    - cron: '0 20 * * *'   # 20:00 UTC = 17:00 Argentina (ART, UTC-3)
  workflow_dispatch:        # Permite ejecución manual desde GitHub

jobs:
  sync:
    name: Sync Drive → data.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar sincronización con Google Drive
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
        run: npm run sync-drive

      - name: Verificar si data.json cambió
        id: check_changes
        run: |
          if git diff --quiet data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  data.json sin cambios — no se necesita commit."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ data.json modificado — se hará commit."
          fi

      - name: Commit y push de data.json actualizado
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: sync Drive content"
          git push
