<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSA ARGENTINA - Unidades</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        industrial: '#F59E0B',
                        arsaAzul: '#13223d',
                        arsaGlass: 'rgba(255, 255, 255, 0.15)'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #13223d; 
            color: #FFFFFF; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-header { 
            background: rgba(19, 34, 61, 0.95); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
        }

        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .active-scale:active { transform: scale(0.96); transition: 0.1s; }
        
        .thumbnail-container::after { content: ""; display: block; padding-bottom: 75%; }
        .item-selected { border: 2px solid #F59E0B !important; background: rgba(245, 158, 11, 0.2) !important; }
        ::-webkit-scrollbar { display: none; }
        
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .category-icon-box {
            position: relative;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .glow-icon { filter: drop-shadow(0 0 8px currentColor); }
    </style>
</head>
<body class="select-none touch-pan-y overflow-x-hidden">

    <!-- CABECERA -->
    <header class="glass-header sticky top-0 z-50 border-b border-white/10 px-6 py-5">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-[10px] font-black tracking-[0.3em] text-industrial uppercase">ARSA ARGENTINA</h1>
                <p id="nav-title" class="text-xl font-extrabold text-white uppercase tracking-tight">Unidades</p>
            </div>
            <div id="selection-badge" class="hidden bg-industrial text-black text-[10px] font-black px-3 py-1 rounded-full shadow-lg">
                0 SELECCIONADOS
            </div>
        </div>
    </header>

    <!-- VISTA: CATEGORÍAS (UNIDADES) -->
    <main id="view-categories" class="p-5 grid grid-cols-2 gap-5 pb-24">
        <!-- Renderizado vía JS -->
    </main>

    <!-- VISTA: GALERÍA -->
    <main id="view-gallery" class="hidden p-4 grid grid-cols-2 gap-3 pb-40">
        <!-- Renderizado vía JS -->
    </main>

    <!-- BOTÓN VOLVER -->
    <button id="btn-back" onclick="goHome()" class="hidden fixed bottom-28 left-6 w-14 h-14 bg-white text-[#13223d] rounded-full shadow-2xl z-40 flex items-center justify-center active-scale transition-all border-4 border-[#13223d]">
        <i class="fa-solid fa-arrow-left text-xl"></i>
    </button>

    <!-- MODAL VISTA PREVIA -->
    <div id="modal-preview" class="fixed inset-0 bg-[#0a1221] z-[60] hidden flex flex-col">
        <div class="p-4 flex justify-between items-center border-b border-white/10 glass-header">
            <span id="preview-name" class="text-xs font-bold truncate pr-4 text-gray-300 uppercase tracking-widest">Vista Previa</span>
            <button onclick="closePreview()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 text-white active-scale">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div id="preview-frame" class="flex-1 w-full bg-black flex flex-col items-center justify-center overflow-hidden">
            <!-- El iframe se inyecta aquí -->
        </div>
        <div class="p-6 safe-bottom bg-[#13223d] border-t border-white/10 flex flex-col gap-3">
            <button id="btn-open-external" class="w-full py-3 bg-white/10 text-white rounded-xl text-xs font-bold uppercase tracking-widest active-scale border border-white/10">
                <i class="fa-solid fa-up-right-from-square mr-2"></i> Abrir en pantalla completa
            </button>
            <button id="btn-share-single" class="w-full py-4 bg-green-600 text-white rounded-2xl font-bold flex items-center justify-center gap-3 active-scale shadow-lg shadow-green-900/40 uppercase text-sm tracking-widest">
                <i class="fa-brands fa-whatsapp text-xl"></i> Compartir archivo
            </button>
        </div>
    </div>

    <!-- BARRA COMPARTIR LOTE -->
    <div id="batch-bar" class="fixed bottom-0 left-0 w-full glass-header border-t border-white/10 p-4 transform translate-y-full transition-all duration-500 z-50 safe-bottom">
        <div class="flex gap-3">
            <button onclick="deselectAll()" class="flex-1 py-4 bg-white/5 rounded-2xl text-[10px] font-bold uppercase tracking-widest text-gray-300 active-scale border border-white/10">Limpiar</button>
            <button onclick="shareBatch()" class="flex-[2] py-4 bg-green-600 text-white rounded-2xl font-bold flex items-center justify-center gap-3 shadow-lg shadow-green-900/40 active-scale border border-green-500/20">
                <i class="fa-brands fa-whatsapp text-xl"></i> ENVIAR LOTE
            </button>
        </div>
    </div>

    <script>

                'https://drive.google.com/file/d/10D2ShM38kSvznCh2kN1ZxnjEU_xGHib9/view?usp=drive_link',

                'https://drive.google.com/file/d/1FWy1hCjMglZwGEtuwPmWvb0y3UJ5WY6H/view?usp=drive_link', 
                'https://drive.google.com/file/d/1XbuJlko3ZjvnLiK2LBkD_-QJpxZA0tT9/view?usp=drive_link',
                'https://drive.google.com/file/d/16h7IQW8kCkcx-3TUr88THtc2YDpaPma_/view?usp=drive_link'
            ]},
            { id: 'cam', name: 'SERVICIO CAMPO', icon: 'fa-truck-fast', color: '#FFFFFF', links: [
                'https://drive.google.com/file/d/1KPD0gSDri1_68ifZBUe9CRqJThHq-xLW/view?usp=drive_link', 
                'https://drive.google.com/file/d/1FC8lsJBoI0_bsFsD_1RvcX4lmpkYIOpb/view?usp=drive_link',

                'https://drive.google.com/file/d/1S5eAjaS1x5pKM7MQExiVnrGw3wKhv1H2/view?usp=drive_link',

            ]},
            { id: 'gen', name: 'GENERACIÓN', icon: 'fa-bolt', color: '#FFFFFF', links: [
                'https://drive.google.com/file/d/14cDIUl1CvVxjZiIFE6V8xiArhjG054oZ/view?usp=drive_link', 
                'https://drive.google.com/file/d/1BD4vgEqIM57it5S1NSBXiOODO0LjEkfF/view?usp=drive_link',

                'https://drive.google.com/file/d/1w7MlOyvk0190aJNBbCjA_sQuFEuLo6ma/view?usp=drive_link', 
                'https://drive.google.com/file/d/1SURH4H7cyp1oMSbIjXL4e7pM2efOeeCM/view?usp=drive_link', 
                'https://drive.google.com/file/d/17AGdm9PafapBFlqwaRkxVhkG73DWOWof/view?usp=drive_link', 
                'https://drive.google.com/file/d/1FzVpEBb39fAqaJg3qk8nIRl7RAv9XuDb/view?usp=drive_link', 
                'https://drive.google.com/file/d/1EqE7x2RjBRUqEkmNQDx8j3dnNOALfWOf/view?usp=drive_link', 
                'https://drive.google.com/file/d/1yHX8992NNTw8LNqY5j7s-045w_ClJxCj/view?usp=drive_link', 
                'https://drive.google.com/file/d/1L_IZ3CMFAEvAFBRK0DNgKoGN1OgN6pGf/view?usp=drive_link', 
                'https://drive.google.com/file/d/19_QKS6uYqBrDLGZ2AZWoL8G6HOksMqdQ/view?usp=drive_link', 
                'https://drive.google.com/file/d/1paKrGHBdTs7GaUyz4SgFFGlSN0sM_rmP/view?usp=drive_link', 
                'https://drive.google.com/file/d/1KoX7vrxbmz5hIAO41fa4hT1JSXGTiObC/view?usp=drive_link', 
                'https://drive.google.com/file/d/1rv2KWPttkFslysQGe4g2Gx1apRoQ6AoU/view?usp=drive_link', 
                'https://drive.google.com/file/d/1ML2d2xWIhIB8D__RiTU-9mQa_E7ieBY4/view?usp=drive_link', 
                'https://drive.google.com/file/d/1YJ1NIqhwPigxRZHOwnlfOYgoqd1V41ab/view?usp=drive_link', 
                'https://drive.google.com/file/d/18_QivUmJJMKEm6AGylkYQeoDDwGp9NBN/view?usp=drive_link', 
                'https://drive.google.com/file/d/1FVbnrDfn8Rxt1V9l99ptg4q9zatmN7kF/view?usp=drive_link'
            ]}
        ];

        let selectedItems = new Set();
        function getDriveId(url) { 
            const match = url.match(/[-\w]{25,}/); 
            return match ? match[0] : null; 
        }

        function renderHome() {
            const container = document.getElementById('view-categories');
            container.innerHTML = '';
            database.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'active-scale glass-card rounded-[2rem] p-6 flex flex-col items-center justify-center text-center gap-4 active:bg-white/20 transition-all';
                div.onclick = () => showCategory(cat.id);
                div.innerHTML = `
                    <div class="category-icon-box">
                        <i class="fa-solid ${cat.icon} text-2xl glow-icon text-white"></i>
                    </div>
                    <div>
                        <h2 class="text-[11px] font-extrabold uppercase tracking-widest text-white">${cat.name}</h2>
                        <p class="text-[9px] text-white/50 mt-1 font-bold uppercase tracking-tighter">${cat.links.length} ELEMENTOS</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function showCategory(id) {
            const cat = database.find(c => c.id === id);
            document.getElementById('nav-title').innerText = cat.name;
            document.getElementById('view-categories').classList.add('hidden');
            document.getElementById('view-gallery').classList.remove('hidden');
            document.getElementById('btn-back').classList.remove('hidden');
            const container = document.getElementById('view-gallery');
            container.innerHTML = '';
            cat.links.forEach((link, idx) => {
                const fileId = getDriveId(link);
                const isSelected = selectedItems.has(link);
                const card = document.createElement('div');
                card.className = `active-scale relative glass-card rounded-2xl overflow-hidden p-2 shadow-lg ${isSelected ? 'item-selected' : ''}`;
                const thumbUrl = `https://lh3.googleusercontent.com/d/${fileId}=w600`;
                card.innerHTML = `
                    <div class="thumbnail-container relative bg-black/40 rounded-xl overflow-hidden mb-2 shimmer" onclick="openPreview('${link}')">
                        <img src="${thumbUrl}" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500" onload="this.style.opacity='1'; this.parentElement.classList.remove('shimmer')" onerror="handleImageError(this)">
                        <div class="absolute inset-0 flex items-center justify-center bg-black/10"><i class="fa-solid fa-play text-white text-xs bg-[#13223d]/60 p-2 rounded-full backdrop-blur-md"></i></div>
                    </div>
                    <div class="flex justify-between items-center px-1">
                        <span class="text-[9px] font-black text-white/40 uppercase tracking-tighter italic">Ref-${idx + 1}</span>
                        <button onclick="event.stopPropagation(); toggleSelect('${link}', this)" class="w-8 h-8 rounded-xl ${isSelected ? 'bg-industrial text-black' : 'bg-white/10 text-white'} flex items-center justify-center transition-all border border-white/10"><i class="fa-solid fa-check text-xs"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function handleImageError(img) {
            img.parentElement.classList.remove('shimmer');
            img.parentElement.innerHTML += `<div class="absolute inset-0 flex flex-col items-center justify-center gap-2"><i class="fa-solid fa-file-video text-2xl text-white/40"></i><span class="text-[7px] font-bold text-white/40 uppercase tracking-widest text-center px-2">Video/Imagen en Drive</span></div>`;
        }

        function goHome() {
            document.getElementById('nav-title').innerText = 'Unidades';
            document.getElementById('view-categories').classList.remove('hidden');
            document.getElementById('view-gallery').classList.add('hidden');
            document.getElementById('btn-back').classList.add('hidden');
            window.scrollTo(0,0);
        }

        function toggleSelect(link, btn) {
            if (selectedItems.has(link)) selectedItems.delete(link); else selectedItems.add(link);
            updateSelectionUI();
            const card = btn.closest('.active-scale');
            if (selectedItems.has(link)) { card.classList.add('item-selected'); btn.className = 'w-8 h-8 rounded-xl bg-industrial text-black flex items-center justify-center transition-all border border-white/10'; } 
            else { card.classList.remove('item-selected'); btn.className = 'w-8 h-8 rounded-xl bg-white/10 text-white flex items-center justify-center transition-all border border-white/10'; }
        }

        function updateSelectionUI() {
            const badge = document.getElementById('selection-badge');
            const bar = document.getElementById('batch-bar');
            if (selectedItems.size > 0) { badge.innerText = `${selectedItems.size} SELECCIONADOS`; badge.classList.remove('hidden'); bar.classList.remove('translate-y-full'); } 
            else { badge.classList.add('hidden'); bar.classList.add('translate-y-full'); }
        }

        function openPreview(link) {
            const modal = document.getElementById('modal-preview');
            const frame = document.getElementById('preview-frame');
            const fileId = getDriveId(link);
            
            // Usamos el visor de Google Drive para mayor compatibilidad
            const previewUrl = `https://drive.google.com/file/d/${fileId}/preview?autoplay=1`;
            
            frame.innerHTML = `<iframe src="${previewUrl}" class="w-full h-full border-none" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            
            document.getElementById('btn-open-external').onclick = () => window.open(link, '_blank');
            document.getElementById('btn-share-single').onclick = () => shareViaWhatsApp([link]);
            modal.classList.remove('hidden');
        }

        function closePreview() { 
            document.getElementById('modal-preview').classList.add('hidden'); 
            document.getElementById('preview-frame').innerHTML = ''; 
        }

        function deselectAll() { 
            selectedItems.clear(); 
            updateSelectionUI(); 
            const currentCatName = document.getElementById('nav-title').innerText; 
            const cat = database.find(c => c.name === currentCatName); 
            if (cat) showCategory(cat.id); 
        }

        function shareViaWhatsApp(links) {
            let message = "*Material Industrial Solicitado:* \n\n";
            links.forEach((l, i) => { message += `🔹 *Archivo ${i+1}:* ${l}\n\n`; });
            message += "----------------------------\n📍 *ARSA ARGENTINA*\n🌐 www.arsa.ar\n📸 @arsaargentina";
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`, '_blank');
        }

        function shareBatch() { shareViaWhatsApp(Array.from(selectedItems)); }
        
        // Carga inicial
        renderHome();
    </script>
</body>
</html>
