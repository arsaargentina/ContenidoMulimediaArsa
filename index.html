<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSA ARGENTINA | Panel de Unidades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        industrial: '#F59E0B',
                        arsaAzul: '#0f172a'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #fff; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-scale:active { transform: scale(0.96); transition: 0.1s; }
        .thumbnail-ratio { position: relative; padding-bottom: 65%; overflow: hidden; border-radius: 12px; }
        ::-webkit-scrollbar { display: none; }
        .item-selected { border: 2px solid #F59E0B !important; background: rgba(245, 158, 11, 0.1) !important; }
    </style>
</head>
<body class="select-none">

    <header class="sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-xl border-b border-white/5 px-6 py-6">
        <div class="max-w-2xl mx-auto flex flex-col gap-5">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-[10px] font-black tracking-[0.3em] text-industrial uppercase">ARSA ARGENTINA</h1>
                    <p id="nav-title" class="text-xl font-black uppercase italic tracking-tighter">Unidades</p>
                </div>
                <div id="selection-count" class="hidden bg-industrial text-black text-[10px] font-black px-3 py-1 rounded-full shadow-lg shadow-industrial/20">
                    0 SELECCIONADOS
                </div>
            </div>

            <div class="relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-industrial/50 text-sm"></i>
                <input 
                    type="text" 
                    id="global-search" 
                    placeholder="Buscar motor, bomba, inyector..." 
                    oninput="handleSearch()"
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-industrial focus:bg-white/10 transition-all text-white placeholder:text-white/20 shadow-inner"
                >
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-5 pb-40">
        <div id="view-categories" class="grid grid-cols-2 gap-4"></div>

        <div id="view-gallery" class="hidden grid grid-cols-2 gap-3"></div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 opacity-30 text-center">
            <i class="fa-solid fa-box-open text-5xl mb-4"></i>
            <p class="text-xs font-bold uppercase tracking-widest">No se encontraron archivos</p>
        </div>
    </main>

    <button id="btn-back" onclick="goHome()" class="hidden fixed bottom-32 left-6 w-14 h-14 bg-white text-black rounded-full shadow-2xl z-40 flex items-center justify-center active-scale border-4 border-[#0f172a]">
        <i class="fa-solid fa-arrow-left text-xl"></i>
    </button>

    <div id="batch-bar" class="fixed bottom-0 left-0 w-full bg-[#0f172a] border-t border-white/10 p-5 transform translate-y-full transition-all duration-500 z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div class="max-w-2xl mx-auto flex gap-3">
            <button onclick="clearSelection()" class="flex-1 py-4 bg-white/5 rounded-2xl text-[10px] font-black uppercase text-gray-400 active-scale border border-white/10">Limpiar</button>
            <button onclick="shareViaWhatsApp()" class="flex-[3] py-4 bg-green-600 text-white rounded-2xl font-bold flex items-center justify-center gap-3 active-scale shadow-lg shadow-green-900/40 uppercase text-xs tracking-widest">
                <i class="fa-brands fa-whatsapp text-xl"></i> Enviar a Cliente
            </button>
        </div>
    </div>

    <script>
        // BASE DE DATOS ACTUALIZADA CON TUS NOMBRES DE DRIVE
        const database = [
            { id: 'iny', name: 'Inyección', icon: 'fa-syringe', links: [
                { url: 'https://drive.google.com/file/d/1WWQPEtGbCQVVVTzKy-280sIcaFfofJvu/view', title: 'MOTOR PAL.mp4' },
                { url: 'https://drive.google.com/file/d/1FuNupR3W0O95N4OjsEJ6Wq80YzAz_2W-/view', title: 'MERCEDES Y BOMBA.mp4' },
                { url: 'https://drive.google.com/file/d/1RKxJTRrjbuGmi3mWdWkBY_CQ_ZfNYwiq/view', title: 'INYECTORES C13.mp4' },
                { url: 'https://drive.google.com/file/d/1CivGkEuV_5G0wa1Zd2-I8_H8TP2fbTAI/view', title: 'Cat c13.mp4' },
                { url: 'https://drive.google.com/file/d/1FttcXpKwyfjJlnf6fFBgs0TmlfPPle4d/view', title: 'Bomba OM366LA.mp4' },
                { url: 'https://drive.google.com/file/d/1fRreMXteAiv5Eq1SnnF73WpuZKsLAU1p/view', title: 'BOMBA SCANIA.mp4' },
                { url: 'https://drive.google.com/file/d/1pBnFFicQSnTbxVSBJDRW1X4y4n8_9r5W/view', title: 'OM 906.mp4' },
                { url: 'https://drive.google.com/file/d/1KF62hlOQfzoqI6QEtjt4Io0LuAMCwUrt/view', title: 'BOMBA BOSCH.mp4' },
                { url: 'https://drive.google.com/file/d/1asyYb_U76DcOwqf7Gyki2vF-MGG0Gbr2/view', title: 'INYECTORES CAT.mp4' },
                { url: 'https://drive.google.com/file/d/1yBN9cKo0qJK6DRDMvpInBD_u4U7nf0HN/view', title: 'BOMBA LINEAL.mp4' }
            ]},
            { id: 'mot', name: 'Motores', icon: 'fa-car-side', links: [
                { url: 'https://drive.google.com/file/d/1BD4vgEqIM57it5S1NSBXiOODO0LjEkfF/view', title: 'SCANIA V8 TEST.mp4' }
            ]}
        ];

        let selectedItems = new Set();
        let currentView = 'home';

        // Renderizar Carpetas en el Home
        function renderHome() {
            const container = document.getElementById('view-categories');
            container.innerHTML = '';
            database.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'active-scale glass rounded-[2.5rem] p-8 flex flex-col items-center justify-center text-center gap-4 cursor-pointer';
                div.onclick = () => openSection(cat.id);
                div.innerHTML = `
                    <div class="w-16 h-16 rounded-full bg-industrial/10 flex items-center justify-center text-industrial">
                        <i class="fa-solid ${cat.icon} text-2xl"></i>
                    </div>
                    <div>
                        <h3 class="text-[11px] font-black uppercase tracking-widest">${cat.name}</h3>
                        <p class="text-[9px] opacity-40 font-bold mt-1">${cat.links.length} ELEMENTOS</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Abrir una sección específica
        function openSection(id) {
            const cat = database.find(c => c.id === id);
            currentView = id;
            document.getElementById('nav-title').innerText = cat.name;
            document.getElementById('view-categories').classList.add('hidden');
            document.getElementById('view-gallery').classList.remove('hidden');
            document.getElementById('btn-back').classList.remove('hidden');
            renderGallery(cat.links);
        }

        // Buscador Global Integrado
        function handleSearch() {
            const query = document.getElementById('global-search').value.toLowerCase().trim();
            const emptyState = document.getElementById('empty-state');
            
            if (query === '') {
                if (currentView === 'home') goHome(); else openSection(currentView);
                return;
            }

            let results = [];
            database.forEach(cat => {
                const matches = cat.links.filter(link => 
                    link.title.toLowerCase().includes(query) || 
                    cat.name.toLowerCase().includes(query)
                );
                matches.forEach(m => results.push({...m, catName: cat.name}));
            });

            document.getElementById('view-categories').classList.add('hidden');
            document.getElementById('view-gallery').classList.remove('hidden');
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('nav-title').innerText = "Resultados";

            if (results.length === 0) {
                emptyState.classList.remove('hidden');
                document.getElementById('view-gallery').innerHTML = '';
            } else {
                emptyState.classList.add('hidden');
                renderGallery(results);
            }
        }

        // Renderizar los archivos en cuadrícula
        function renderGallery(items) {
            const container = document.getElementById('view-gallery');
            container.innerHTML = '';
            items.forEach((item, idx) => {
                const isSelected = selectedItems.has(item.url);
                const driveId = item.url.match(/[-\w]{25,}/);
                const thumb = driveId ? `https://lh3.googleusercontent.com/d/${driveId}=w400` : '';
                
                const card = document.createElement('div');
                card.className = `active-scale glass rounded-3xl p-2 transition-all ${isSelected ? 'item-selected' : ''}`;
                card.innerHTML = `
                    <div class="thumbnail-ratio bg-black/40 mb-3" onclick="window.open('${item.url}', '_blank')">
                        <img src="${thumb}" class="absolute inset-0 w-full h-full object-cover" onerror="this.src='https://placehold.co/400x300/13223d/white?text=ARSA+VIDEO'">
                        <div class="absolute inset-0 flex items-center justify-center bg-black/20">
                            <i class="fa-solid fa-play text-white/50 text-xs"></i>
                        </div>
                    </div>
                    <div class="px-2 pb-2">
                        <h4 class="text-[10px] font-bold uppercase truncate leading-tight">${item.title}</h4>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-[8px] font-black text-industrial uppercase tracking-tighter">${item.catName || ''}</span>
                            <button onclick="toggleSelect('${item.url}', this)" class="w-8 h-8 rounded-xl ${isSelected ? 'bg-industrial text-black' : 'bg-white/10 text-white'} flex items-center justify-center transition-all">
                                <i class="fa-solid fa-check text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleSelect(url, btn) {
            if (selectedItems.has(url)) selectedItems.delete(url);
            else selectedItems.add(url);
            
            const badge = document.getElementById('selection-count');
            const bar = document.getElementById('batch-bar');
            badge.innerText = `${selectedItems.size} SELECCIONADOS`;
            
            if (selectedItems.size > 0) {
                badge.classList.remove('hidden');
                bar.classList.remove('translate-y-full');
            } else {
                badge.classList.add('hidden');
                bar.classList.add('translate-y-full');
            }
            
            // Refrescar visualmente la tarjeta
            btn.closest('.glass').classList.toggle('item-selected');
            btn.className = `w-8 h-8 rounded-xl ${selectedItems.has(url) ? 'bg-industrial text-black' : 'bg-white/10 text-white'} flex items-center justify-center transition-all`;
        }

        function goHome() {
            currentView = 'home';
            document.getElementById('global-search').value = '';
            document.getElementById('nav-title').innerText = "Unidades";
            document.getElementById('view-categories').classList.remove('hidden');
            document.getElementById('view-gallery').classList.add('hidden');
            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            renderHome();
        }

        function clearSelection() {
            selectedItems.clear();
            toggleSelect(null, null); // Forzar actualización de UI
            if (currentView === 'home') renderHome(); else openSection(currentView);
        }

        function shareViaWhatsApp() {
            let msg = "*Material solicitado - ARSA ARGENTINA*%0A%0A";
            Array.from(selectedItems).forEach((url, i) => {
                msg += `🔹 *Archivo ${i+1}:* ${url}%0A%0A`;
            });
            window.open(`https://api.whatsapp.com/send?text=${msg}`, '_blank');
        }

        // Inicializar
        renderHome();
    </script>
</body>
</html>
